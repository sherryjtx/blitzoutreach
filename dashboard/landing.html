<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Video for Tyler — Sherry Automates</title>
    <meta name="description" content="A personalized video breakdown from Sheharyar at Sherry Automates.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Design Tokens ── */
        :root {
            --brand: #CC2222;
            --brand-light: #FF4D4D;
            --brand-dark: #8B1A1A;
            --brand-glow: rgba(204, 34, 34, 0.2);
            --bg: #040406;
            --bg-base: #060609;
            --bg-surface: rgba(255, 255, 255, 0.015);
            --border: rgba(255, 255, 255, 0.045);
            --text: #FAFAFA;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --text-muted: rgba(255, 255, 255, 0.4);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
            --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            --font-display: 'Outfit', 'Geist', sans-serif;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* ── Background Glow ── */
        .glow {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.15;
            mix-blend-mode: screen;
        }

        .glow-orb-1 {
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--brand) 0%, transparent 70%);
            top: -200px;
            right: -100px;
        }

        .glow-orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--brand-dark) 0%, transparent 70%);
            bottom: -150px;
            left: -100px;
        }

        /* ── Header ── */
        .header {
            width: 100%;
            max-width: 1100px;
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .co-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .co-brand-logo {
            height: 28px;
            object-fit: contain;
            mix-blend-mode: screen;
        }

        .co-brand-divider {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 300;
        }

        .co-brand-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            font-family: var(--font-display);
        }

        /* ── Main Content ── */
        .content {
            width: 100%;
            max-width: 1100px;
            padding: 0 32px 64px 32px;
            position: relative;
            z-index: 10;
            flex: 1;
        }

        /* ── Greeting ── */
        .greeting {
            margin-bottom: 32px;
            animation: fadeInUp 600ms var(--ease) both;
        }

        .greeting-name {
            font-family: var(--font-display);
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .greeting-name .accent {
            background: linear-gradient(135deg, #FFF 30%, var(--brand-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .greeting-sub {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .greeting-sub .company {
            color: var(--text);
            font-weight: 600;
        }

        /* ── Bento Grid ── */
        .workspace-grid {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: var(--space-xl);
            align-items: start;
            margin-bottom: 32px;
            animation: fadeInUp 600ms var(--ease) 100ms both;
        }

        @media (max-width: 900px) {
            .workspace-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Translucent Cards */
        .card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            overflow: hidden;
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.035), 
                        0 20px 48px -10px rgba(0, 0, 0, 0.5);
            transition: all 300ms var(--ease-spring);
        }

        .card:hover {
            border-color: rgba(204, 34, 34, 0.25);
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.07), 
                        0 24px 60px -10px rgba(0, 0, 0, 0.6), 
                        0 0 30px 0 var(--brand-glow);
        }

        /* Video Card */
        .video-card {
            padding: 0;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            border-radius: 15px;
        }

        /* Booking Card */
        .booking-card {
            height: 700px;
        }

        .calendly-inline-widget {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── Sender Profile ── */
        .sender-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: fit-content;
            margin-top: 40px;
            backdrop-filter: blur(10px);
            animation: fadeInUp 600ms var(--ease) 200ms both;
            transition: all 250ms var(--ease);
        }

        .sender-row:hover {
            border-color: rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
        }

        .sender-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.08);
        }

        .sender-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sender-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sender-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            font-family: var(--font-display);
        }

        .sender-title {
            font-size: 11px;
            color: var(--text-muted);
        }

        .sender-brand-logo {
            height: 24px;
            margin-left: 12px;
            padding-left: 16px;
            border-left: 1px solid var(--border);
            object-fit: contain;
            mix-blend-mode: screen;
        }

        /* ── Footer ── */
        .footer {
            width: 100%;
            max-width: 1100px;
            padding: 24px 32px 32px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .footer-text {
            font-size: 11px;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 150ms;
        }

        .footer-text a:hover {
            color: var(--brand-light);
        }

        /* ── Animations ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="glow">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="co-brand">
            <img src="../assets/logo_wordmark.png" alt="Sherry Automates" class="co-brand-logo">
            <span class="co-brand-divider">×</span>
            <span class="co-brand-name">ADknown</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="content">
        <!-- Personalized Greeting -->
        <div class="greeting">
            <h1 class="greeting-name">Hey <span class="accent">Tyler</span>,</h1>
            <p class="greeting-sub">I put together a quick breakdown for <span class="company">ADknown</span></p>
        </div>

        <div class="workspace-grid">
            <!-- Left Column: Video Player -->
            <div class="card video-card">
                <div class="video-wrapper">
                    <!-- Placeholder video player -->
                    <video id="video" controls playsinline poster="../assets/logo_sa.png">
                        <source src="" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>

            <!-- Right Column: Booking Scheduler -->
            <div class="card booking-card">
                <!-- Calendly inline widget begin -->
                <div class="calendly-inline-widget" data-url="https://calendly.com/sherryjtx9?background_color=1a1a1a&text_color=ffffff&primary_color=dc143c"></div>
                <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
                <!-- Calendly inline widget end -->
            </div>
        </div>

        <!-- Sender Row -->
        <div class="sender-row">
            <div class="sender-avatar">
                <img src="../assets/profile_photo.png" alt="Sheharyar">
            </div>
            <div class="sender-info">
                <div class="sender-name">Sheharyar Abid</div>
                <div class="sender-title">Founder, Sherry Automates</div>
            </div>
            <img src="../assets/logo_sa.png" alt="SA" class="sender-brand-logo">
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">Powered by <a href="#">BlitzOutreach</a> · Personalized for Tyler at ADknown</p>
    </footer>
</body>
</html>
