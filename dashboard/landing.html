<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Video for Tyler — Sherry Automates</title>
    <meta name="description" content="A personalized video breakdown from Sheharyar at Sherry Automates.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset and base styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6; /* Light gray body background */
            color: #FAFAFA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            overflow-x: hidden;
            position: relative;
            line-height: 1.5;
        }

        /* Centered card container */
        .watch-card {
            width: 100%;
            max-width: 820px;
            background: #08080a; /* OLED black background */
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 48px 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
            text-align: center;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.4), 0 10px 20px -5px rgba(0, 0, 0, 0.3);
            overflow: hidden; /* Clips the background orb */
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .watch-card {
                padding: 32px 20px;
                border-radius: 16px;
            }
        }

        /* Background glows inside the card */
        .glow-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            mix-blend-mode: screen;
        }

        .glow-orb-1 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #dc2626 0%, rgba(220,38,38,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Beautiful red glow radiating behind the video player frame */
        .video-glow {
            position: absolute;
            top: 45%;
            left: 50%;
            width: 580px;
            height: 320px;
            background: radial-gradient(circle, rgba(220, 38, 38, 0.35) 0%, rgba(220, 38, 38, 0) 75%);
            transform: translate(-50%, -50%);
            filter: blur(55px);
            z-index: 2;
            pointer-events: none;
        }

        /* Co-branding header */
        .co-brand-header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 40px;
            position: relative;
            z-index: 5;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .company-logo {
            height: 20px;
            object-fit: contain;
        }

        .logo-divider {
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            font-weight: 300;
        }

        .co-brand-name {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: -0.01em;
        }

        /* Title & Subtitle */
        .intro-section {
            margin-bottom: 32px;
            max-width: 600px;
            position: relative;
            z-index: 5;
        }

        .personalized-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.15;
            margin-bottom: 8px;
            color: #ff5252;
        }

        .personalized-subtitle {
            font-family: 'Geist', sans-serif;
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        /* Mac Browser Video Frame */
        .video-browser-frame {
            position: relative;
            width: 100%;
            background-color: #121214;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.55);
            overflow: visible;
            margin-bottom: 40px;
            z-index: 5;
        }

        .browser-header {
            height: 32px;
            display: flex;
            align-items: center;
            padding-left: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .browser-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #27c93f; }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            overflow: hidden;
            border-bottom-left-radius: 11px;
            border-bottom-right-radius: 11px;
            cursor: pointer;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* Custom Centered Translucent Play Button */
        .video-play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 250ms cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 5;
        }

        .play-button-circle {
            width: 68px;
            height: 68px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2.2px solid rgba(255, 255, 255, 0.75);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            transition: transform 200ms cubic-bezier(0.23, 1, 0.32, 1), background-color 200ms ease, border-color 200ms ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .play-button-circle svg {
            margin-left: 4px;
        }

        .video-wrapper:hover .play-button-circle {
            transform: scale(1.08);
            background: rgba(255, 255, 255, 0.22);
            border-color: #fff;
        }

        .video-wrapper:active .play-button-circle {
            transform: scale(0.95);
        }

        .video-wrapper.playing .video-play-overlay {
            opacity: 0;
            pointer-events: none;
        }



        /* Sender Info block */
        .sender-info-block {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            position: relative;
            z-index: 5;
        }

        .sender-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
        }

        .sender-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sender-details {
            text-align: left;
            display: flex;
            flex-direction: column;
        }

        .sender-name {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #FAFAFA;
            line-height: 1.2;
        }

        .sender-title {
            font-family: 'Geist', sans-serif;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 1px;
        }

        /* Booking Button */
        .book-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #dc2626; /* Vibrant red */
            color: #FFF;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            padding: 14px 40px;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(220, 38, 38, 0.35), inset 0 1px 0 rgba(255,255,255,0.15);
            transition: transform 250ms cubic-bezier(0.16, 1, 0.3, 1), background-color 250ms ease, box-shadow 250ms ease;
            margin-bottom: 16px;
            text-decoration: none;
            position: relative;
            z-index: 5;
        }

        .book-btn:hover {
            background: #ef4444; /* Snappy bright hover */
            transform: translateY(-1.5px);
            box-shadow: 0 6px 24px rgba(220, 38, 38, 0.5), inset 0 1px 0 rgba(255,255,255,0.25);
        }

        .book-btn:active {
            transform: scale(0.97) translateY(0);
        }

        .book-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.25;
        }

        /* Muted secondary texts */
        .secondary-text {
            font-size: 11.5px;
            color: rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 5;
        }

        /* Booking modal overlay */
        .booking-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        .booking-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 840px;
            height: 700px;
            background: #111113;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            overflow: hidden;
            z-index: 10;
            transform: translateY(24px) scale(0.97);
            transition: transform 300ms cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
        }

        .booking-modal.open .modal-content {
            transform: translateY(0) scale(1);
        }

        .close-modal-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: background-color 200ms ease, color 200ms ease;
        }

        .close-modal-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .intro-section, .video-browser-frame, .sender-info-block, .book-btn, .secondary-text {
            animation: fadeInUp 600ms cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .intro-section { animation-delay: 50ms; }
        .video-browser-frame { animation-delay: 120ms; }
        .sender-info-block { animation-delay: 180ms; }
        .book-btn { animation-delay: 240ms; }
        .secondary-text { animation-delay: 280ms; }
    </style>
</head>
<body>
    <div class="glow-container">
        <div class="glow-orb glow-orb-1"></div>
    </div>

    <div class="watch-card">
        <!-- Co-branding Header -->
        <header class="co-brand-header">
            <div class="logo-area">
                <img src="../assets/logo_wordmark.png" alt="Sherry Automates" class="company-logo" style="height: 18px; width: auto;">
                <span class="logo-divider">×</span>
                <span class="co-brand-name">ADknown</span>
            </div>
        </header>

        <!-- Intro Greeting Section -->
        <section class="intro-section">
            <h1 class="personalized-title">Hey Tyler,</h1>
            <p class="personalized-subtitle">I put together a quick breakdown for ADknown</p>
        </section>

        <!-- Centered video glow radiating behind the frame -->
        <div class="video-glow"></div>

        <!-- Mac Browser Video Frame -->
        <div class="video-browser-frame">
            <div class="browser-header">
                <div class="browser-dots">
                    <span class="dot dot-red"></span>
                    <span class="dot dot-yellow"></span>
                    <span class="dot dot-green"></span>
                </div>
            </div>
            <div class="video-wrapper">
                <video id="outreachVideo" poster="../assets/logo_sa.png" playsinline>
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <!-- Centered Translucent Play Button Overlay -->
                <div class="video-play-overlay" id="playOverlay">
                    <div class="play-button-circle">
                        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sender Profile Info -->
        <div class="sender-info-block">
            <div class="sender-avatar">
                <img src="../assets/profile_photo.png" alt="Sheharyar">
            </div>
            <div class="sender-details">
                <span class="sender-name">Sheharyar A.</span>
                <span class="sender-title">Founder, Sherry Automates</span>
            </div>
        </div>

        <!-- Booking CTA -->
        <button class="book-btn" id="bookCallBtn">
            <span>Book a 10-min call</span>
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>

        <p class="secondary-text">or reply to the email — I read every one</p>
    </div>

    <!-- Booking Modal (Glassmorphic popup) -->
    <div class="booking-modal" id="bookingModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="close-modal-btn" id="closeModalBtn" title="Close">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <!-- Calendly Inline Widget -->
            <div class="calendly-inline-widget" data-url="https://calendly.com/sherryjtx9?background_color=1a1a1a&text_color=ffffff&primary_color=dc143c" style="min-width:320px;height:100%;width:100%;"></div>
        </div>
    </div>

    <!-- Calendly widget javascript -->
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>

    <!-- Interactive Scripting -->
    <script>
        const video = document.getElementById('outreachVideo');
        const playOverlay = document.getElementById('playOverlay');
        const videoWrapper = video ? video.parentElement : null;
        const bookCallBtn = document.getElementById('bookCallBtn');
        const bookingModal = document.getElementById('bookingModal');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeModalBtn = document.getElementById('closeModalBtn');

        // Custom Play Overlay trigger
        if (playOverlay && video) {
            playOverlay.addEventListener('click', () => {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            });
        }

        // Toggle wrapper playing classes
        if (video && videoWrapper) {
            video.addEventListener('play', () => {
                videoWrapper.classList.add('playing');
            });
            video.addEventListener('pause', () => {
                videoWrapper.classList.remove('playing');
            });
            video.addEventListener('ended', () => {
                videoWrapper.classList.remove('playing');
            });
        }
        
        if (bookCallBtn && bookingModal) {
            bookCallBtn.addEventListener('click', () => {
                bookingModal.classList.add('open');
            });
        }
        
        const closeModal = () => {
            bookingModal.classList.remove('open');
        };
        
        if (modalOverlay) modalOverlay.addEventListener('click', closeModal);
        if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
    </script>
</body>
</html>
