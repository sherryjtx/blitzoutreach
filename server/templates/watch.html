<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Video for {{ name }} - Sherry Automates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="glow-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <header class="app-header">
        <div class="logo-area">
            <img src="/static/logo_wordmark.png" alt="Sherry Automates" class="company-logo" style="mix-blend-mode: screen; height: 28px;">
            {% if company_logo %}
                <span class="logo-divider">×</span>
                <img src="{{ company_logo }}" alt="{{ company }}" class="company-logo">
            {% endif %}
        </div>
    </header>

    <main class="content-container">
        <section class="intro-section">
            <h1 class="personalized-title">Hey <span class="gradient-text">{{ name }}</span>, I recorded this breakdown for you</h1>
            <p class="personalized-subtitle">A customized look at how we can optimize operations at {{ company }}.</p>
        </section>

        <section class="workspace-grid">
            <!-- Video Player Column -->
            <div class="card video-card">
                <div class="video-wrapper">
                    <video id="outreachVideo" controls poster="/static/poster_placeholder.png" playsinline>
                        <source src="{{ video_url }}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>

            <!-- Booking Widget Column -->
            <div class="card booking-card" style="padding: 0; overflow: hidden; height: 700px;">
                <!-- Calendly Inline Widget -->
                <div class="calendly-inline-widget" data-url="{{ calendly_url }}?background_color=1a1a1a&text_color=ffffff&primary_color=dc143c" style="min-width:320px;height:100%;width:100%;border:none;"></div>
                <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
            </div>
        </section>
    </main>

    <!-- Tracking Script -->
    <script>
        const video = document.getElementById('outreachVideo');
        const videoId = "{{ video_id }}";
        let watched25 = false;
        let watched50 = false;
        let watched75 = false;
        let watched100 = false;
        let timeSpentStart = Date.now();

        // Send event to backend
        async function logEvent(eventType, metadata = {}) {
            try {
                await fetch('/track', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        video_id: videoId,
                        event_type: eventType,
                        time_offset: video ? video.currentTime : 0,
                        metadata: metadata
                    })
                });
            } catch (err) {
                console.error("Tracking log failed:", err);
            }
        }

        // Track Video Events
        if (video) {
            video.addEventListener('play', () => {
                logEvent('play');
            });

            video.addEventListener('pause', () => {
                logEvent('pause');
            });

            video.addEventListener('timeupdate', () => {
                if (!video.duration) return;
                const progress = (video.currentTime / video.duration) * 100;
                
                if (progress >= 25 && !watched25) {
                    watched25 = true;
                    logEvent('progress_25');
                }
                if (progress >= 50 && !watched50) {
                    watched50 = true;
                    logEvent('progress_50');
                }
                if (progress >= 75 && !watched75) {
                    watched75 = true;
                    logEvent('progress_75');
                }
            });

            video.addEventListener('ended', () => {
                if (!watched100) {
                    watched100 = true;
                    logEvent('completed');
                }
            });
        }

        // Track time spent on page when user leaves
        window.addEventListener('beforeunload', () => {
            const timeSpentSec = Math.round((Date.now() - timeSpentStart) / 1000);
            // Fire beacon (more reliable during unload)
            navigator.sendBeacon('/track-beacon', JSON.stringify({
                video_id: videoId,
                event_type: 'time_spent',
                metadata: { seconds: timeSpentSec }
            }));
        });

        // Calendly Event Listener
        window.addEventListener("message", function(e) {
            if (e.origin === "https://calendly.com" && e.data.event === "calendly.event_scheduled") {
                console.log("Calendly event booked:", e.data);
                logEvent('meeting_booked', {
                    event_uri: e.data.payload.event.uri,
                    invitee_uri: e.data.payload.invitee.uri
                });
            }
        });
    </script>
</body>
</html>
